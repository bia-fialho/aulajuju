<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doceria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <section class="form-section">
            <h2>Fazer pedido</h2>

            <input type="text" id="cliente" placeholder="Nome do cliente">
            <input type="tel" id="telefone" placeholder="Telefone do cliente">

            <select id="doce">
                <option value="">Selecione um doce</option>
                <option value="Brigadeiro">Brigadeiro</option>
                <option value="Bolo de Cenoura">Bolo de Cenoura</option>
                <option value="Bolo de Laranja">Bolo de Laranja</option>
                <option value="Palha Italiana">Palha Italiana</option>
                <option value="Copo da Felicidade">Copo da Felicidade</option>
            </select>

            <input type="number" id="preco" placeholder="Preço">

            <select id="bebida">
                <option value="">Selecione uma bebida</option>
                <option value="Sprite">Sprite</option>
                <option value="Suco de Maracujá">Suco de Maracujá</option>
                <option value="Água">Água</option>
            </select>

            <input type="number" id="precoBebida" placeholder="Preço da bebida">

            <button onclick="adicionarPedido()">Adicionar Pedido</button>
        </section>

        <section class="lista-section">
            <h2>Pedidos</h2>
            <ul id="listaPedidos"></ul>

            <h3 id="totalPedidos">Total: R$ 0.00</h3>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
